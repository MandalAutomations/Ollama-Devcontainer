services:
    app:
        image: python:3.10.16-bullseye
        command: sleep infinity
        working_dir: /workspaces/Ollama-Devcontainer
        volumes:
            - ..:/workspaces/Ollama-Devcontainer

    ollama:
        image: ollama/ollama:0.24.0
        container_name: ollama
        restart: unless-stopped
        ports:
            - "11434:11434"
        volumes:
            - ollama_data:/root/.ollama

volumes:
    ollama_data:
        driver: local
