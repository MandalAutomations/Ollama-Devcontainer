name: Ollama GitHub Workflow Example
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for the Ollama model'
        default: 'What is the capital of France?'
        required: true

jobs:
  container-job:
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:0.24.0
        ports:
          - 11434:11434

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate response from prompt
        env:
          OLLAMA_HOST: "http://localhost:11434"
          PROMPT: ${{ inputs.prompt }}
        run: |
          python examples/text_generate_response.py "$PROMPT" >> "$GITHUB_STEP_SUMMARY"
